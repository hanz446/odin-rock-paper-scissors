<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Rock Paper Scissors</title>
    <link href="styles.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div id="game-display">
        <div id="score-container">
            <div id="player-score">Player: 0</div>
            <div id="comp-score">Computer: 0</div>
        </div>
        <div id="comp-choice-container">
            <div id="comp-choice-label">Computer</div>
            <div id="comp-choice-display">✌️</div>
        </div>
        <div id="result-display">First to five wins!</div>
        <div id="button-container">
            <button type="button" id="0" class="selection default">👊</button>
            <button type="button" id="1" class="selection default">✋</button>
            <button type="button" id="2" class="selection default">✌️</button>
        </div>
    </div>
    <button type="button" id="play-game">Play Game</button>
</body>
</html>
